<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Simple Practical Builder</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;600&display=swap"
    rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="styles.css" />


</head>

<body>

  <!-- VISUAL SIDEBAR -->
  <div id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-header-meta">
        <div class="sidebar-title"><i class="ph-fill ph-squares-four"></i> Workspace</div>
        <div class="sidebar-project-name">Java Practical Builder</div>
        <div class="sidebar-project-sub">Academic Design Project</div>
      </div>
      <button class="toggle-sidebar-btn" onclick="toggleSidebar()" title="Toggle Sidebar">
        <i class="ph-fill ph-list"></i>
      </button>
    </div>
    <div class="sidebar-tabs">
      <button class="sidebar-tab active">Scene</button>
      <button class="sidebar-tab">Assets</button>
    </div>
    <div id="thumb-list"></div>
    <div class="sidebar-search">
      <i class="ph ph-magnifying-glass"></i>
      <span>Search…</span>
      <kbd>⌘K</kbd>
    </div>
  </div>

  <div class="print-bg"></div>

  <!-- PRO STUDIO RIGHT TOOL PANEL -->
  <div class="controls-bar">
    <div class="control-top">
      <div class="control-avatars">
        <span class="avatar avatar-1">A</span>
        <span class="avatar avatar-2">P</span>
      </div>
      <button class="share-btn"><i class="ph-fill ph-share-network"></i> Share</button>
    </div>

    <div class="control-switch">
      <button class="control-switch-btn active">Design</button>
      <button class="control-switch-btn">Animation</button>
    </div>

    <!-- ZONE 1: DOCUMENT (Top) -->
    <div class="nav-group">
      <div class="nav-label"><i class="ph-bold ph-magic-wand"></i> Build Document</div>
      <div class="row">
        <button class="btn btn-add" style="color: #0ea5e9;" onclick="newProject()">
          <i class="ph-fill ph-sparkle"></i> New Project
        </button>
        <button class="btn" style="color: #f59e0b;" onclick="addPage()">
          <i class="ph-fill ph-file-plus"></i> Add Page
        </button>
        <button class="btn" style="color: #7c3aed;" onclick="addTheoryPage()">
          <i class="ph-fill ph-book-open-text"></i> Add Theory
        </button>
      </div>
    </div>

    <!-- ZONE 2: VIEWSTYLE (Center) -->
    <div class="nav-group">
      <div class="nav-label"><i class="ph-bold ph-paint-brush-broad"></i> View & Style</div>
      <div class="row">
        <select id="themeSelector" class="theme-select" onchange="changeTheme(this.value)">
          <optgroup label="Essential Paper">
            <option value="academic-lined">🔵 Lined Notebook</option>
            <option value="academic-legal-pad">🟡 Legal Pad</option>
            <option value="academic-graph">📐 Graph Paper</option>
            <option value="academic-dot-grid">📓 Dot Grid</option>
            <option value="academic-cornell">📝 Cornell Notes</option>
          </optgroup>
          <optgroup label="Specialty Styles">
            <option value="parchment">📜 Antique Parchment</option>
            <option value="academic-clean">📄 Clean Minimalist</option>
            <option value="academic-blue-ink">🖊️ Blue Ink Style</option>
            <option value="academic-typewriter">🖨️ Vintage Typed</option>
          </optgroup>
        </select>

        <div class="zoom-controls">
          <button class="zoom-btn" onclick="setZoom(0.75)">75%</button>
          <button class="zoom-btn active" onclick="setZoom(1.0)">100%</button>
          <button class="zoom-btn" onclick="setZoom('fit')">Fit</button>
        </div>
      </div>
    </div>

    <!-- ZONE 3: FILE & CLOUD (Bottom) -->
    <div class="nav-group">
      <div class="nav-label"><i class="ph-bold ph-cloud-check"></i> File & Sync</div>
      <div class="row">
        <button class="btn btn-export" style="color: #10b981;" onclick="window.print()">
          <i class="ph-fill ph-arrow-square-out"></i> Export PDF
        </button>

        <!-- Hook for cloud sync.js -->
        <div id="cloud-portal-hook" style="width:100%; display:flex; flex-direction:column; gap:10px;"></div>
      </div>
    </div>
  </div>

  <!-- CONTAINER FOR PAGES (Everything inside here gets saved!) -->
  <table class="print-table">
    <thead class="print-header">
      <tr>
        <th></th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>
          <div id="pages-wrapper"></div>
        </td>
      </tr>
    </tbody>
    <tfoot class="print-footer">
      <tr>
        <td></td>
      </tr>
    </tfoot>
  </table>

  <!-- HIDDEN TEMPLATE -->
  <template id="page-tpl">
    <div class="a4-page">
      <button class="delete-page-btn" onclick="deletePage(this)" title="Delete Page">✖</button>
      <div class="content">
        <div class="top-spacer" style="height: 18mm;"></div>

        <!-- Editable Heading -->
        <div class="program-heading" contenteditable="true" placeholder="Enter Heading (e.g. Program X)" empty></div>
        <div class="program-sub" contenteditable="true" placeholder="Enter Subtitle (e.g. WAP to ...)" empty></div>
        <div class="divider"></div>

        <div class="section-label">Source Code</div>
        <div class="code-block">
          <div class="window-dots">
            <div class="dot red"></div>
            <div class="dot yellow"></div>
            <div class="dot green"></div>
          </div>

          <!-- Editable Plaintext Code block -->
          <pre class="code-editor" contenteditable="plaintext-only" placeholder="Paste Java code here..."
            oninput="checkEmpty(this)" empty></pre>
        </div>

        <div class="section-group">
          <div class="section-label">Output</div>
          <div class="output-block">
            <div class="output-bar">
              <div style="display:flex; gap:6px; align-items:center;">
                <div class="dot red"></div>
                <div class="dot yellow"></div>
                <div class="dot green"></div>
                <span
                  style="font-size:10px; color:#aaa; font-family:'JetBrains Mono', monospace; margin-left:8px;">cmd.exe</span>
              </div>

              <!-- File Uploader -->
              <label class="upload-btn">🖼️ Import Image
                <input type="file" accept="image/*" style="display:none;" onchange="loadImage(event, this)">
              </label>
            </div>

            <!-- Editable Text Output Block -->
            <pre class="output-editor" contenteditable="plaintext-only"
              placeholder="Paste simulated text output, or upload a screenshot image above..."
              oninput="checkEmpty(this)" empty></pre>

            <!-- Image Gallery Container -->
            <div class="image-gallery"></div>

            <div class="img-actions">
              <button class="clear-img-btn" onclick="removeImage(this)">Clear All Images</button>
            </div>
          </div>
        </div>

      </div>
    </div>
  </template>

  <!-- THEORY TEMPLATE -->
  <template id="theory-page-tpl">
    <div class="a4-page theory-page">
      <button class="delete-page-btn" onclick="deletePage(this)" title="Delete Page">✖</button>
      <div class="content">
        <div class="top-spacer" style="height: 18mm;"></div>

        <div class="theory-elements-container"></div>

        <div class="builder-toolbar">
          <button class="builder-btn" onclick="addTheoryBlock(this, 'heading')">+ Heading</button>
          <button class="builder-btn" onclick="addTheoryBlock(this, 'question')">+ Question</button>
          <button class="builder-btn" onclick="addTheoryBlock(this, 'text')">+ Theory Text</button>
        </div>
      </div>
    </div>
  </template>

  <!-- APP ACTIONS LOGIC -->
    <script src="app.js"></script>
  <script src="Practical_Portal/sync.js"></script>
  <script src="mobile-block.js"></script>
</body>

</html>
